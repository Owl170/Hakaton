<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrostScan | Карта</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
            rel="stylesheet"
    >
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""
    >
    <link rel="stylesheet" href="/assets/styles.css">
</head>
<body>
<div class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-head">
            <a class="logo-link" href="/">FrostScan</a>
        </div>

        <section class="panel">
            <h3>Фильтры</h3>
            <label for="territoryFilter">Территория</label>
            <select id="territoryFilter">
                <option value="">Все</option>
            </select>

            <label for="yearFilter">Год</label>
            <select id="yearFilter">
                <option value="">Все</option>
            </select>

            <label for="riskFilter">Уровень деградации</label>
            <select id="riskFilter">
                <option value="">Все</option>
                <option value="low">Безопасный</option>
                <option value="moderate">Низкий риск</option>
                <option value="high">Повышенный риск</option>
                <option value="critical">Опасный</option>
            </select>

            <label for="featureFilter">Тип признака</label>
            <select id="featureFilter">
                <option value="">Все</option>
                <option value="water_expansion">Расширение воды</option>
                <option value="overwetting">Переувлажнение</option>
                <option value="heave_mounds">Бугры пучения</option>
                <option value="surface_texture_change">Изменение текстуры</option>
            </select>
        </section>

        <section class="panel">
            <h3>Анализ</h3>
            <button class="btn btn-outline small" id="refreshBtn">Обновить слои</button>
            <button class="btn btn-outline small" id="exportBtn">Скачать GeoJSON</button>
            <p id="statusText" class="status-text">Готово</p>
        </section>
    </aside>

    <main class="content">
        <header class="topbar">
            <div class="title-wrap">
                <h1>Карта деградации многолетней мерзлоты</h1>
                <p id="analysisMeta"></p>
            </div>
            <div class="stats-grid">
                <article class="stat-card">
                    <span>Площадь проблемных зон</span>
                    <strong id="problemAreaValue">0 га</strong>
                </article>
                <article class="stat-card">
                    <span>Обнаружено объектов</span>
                    <strong id="objectsCountValue">0</strong>
                </article>
                <article class="stat-card">
                    <span>Средний риск</span>
                    <strong id="meanRiskValue">0</strong>
                </article>
            </div>
        </header>

        <section class="workspace">
            <div id="map"></div>
            <div class="insights">
                <article class="panel">
                    <h3>Динамика по годам</h3>
                    <div id="yearlyChart" class="yearly-chart"></div>
                </article>
                <article class="panel">
                    <h3>Карточка участка</h3>
                    <div id="featureCard" class="feature-card-detail">
                        Нажмите на участок на карте.
                    </div>
                </article>
            </div>
        </section>
    </main>
</div>

<script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""
></script>
<script src="/assets/app.js?v=20260402-10"></script>
</body>
</html>
